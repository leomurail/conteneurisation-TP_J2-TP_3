apiVersion: v1
kind: Service
metadata:
  name: service-user
spec:
  selector:
    app: service-user
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: v1
kind: Service
metadata:
  name: service-order
spec:
  selector:
    app: service-order
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5002
  type: LoadBalancer
